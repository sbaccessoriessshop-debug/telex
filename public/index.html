    <script>
      // Route /analytics and /settings to dedicated pages
      (function () {
        var p = window.location.pathname;
        if (p === '/analytics' || p === '/analytics/' || p.indexOf('/analytics?') === 0) {
          window.location.replace('/analytics.html' + window.location.search + window.location.hash);
        }
        if (p === '/settings' || p === '/settings/') {
          window.location.replace('/settings.html');
        }
        if (p === '/admin-market' || p === '/admin-market/') {
          window.location.replace('/admin-market.html');
        }
        if (p === '/compare' || p === '/compare/') {
          window.location.replace('/compare.html');
        }
        if (p === '/invoice' || p === '/invoice/') {
          window.location.replace('/invoice.html' + window.location.search);
        }
      })();
      // Intercept clicks to /analytics or /settings in the React SPA
      document.addEventListener('click', function (e) {
        var t = e.target;
        var a = t && t.closest ? t.closest('a[href="/analytics"], a[href^="/analytics?"], a[href^="/analytics/"], a[href="/settings"], a[href^="/settings/"]') : null;
        if (!a) return;
        if (e.defaultPrevented || e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
        e.preventDefault();
        e.stopPropagation();
        var href = a.getAttribute('href');
        if (href === '/settings' || href.indexOf('/settings/') === 0) {
          window.location.href = '/settings.html';
        } else {
          window.location.href = '/analytics.html';
        }
      }, true);
      // Intercept SPA pushState navigation to /settings (React Router)
      (function(){
        var _push = history.pushState.bind(history);
        var _replace = history.replaceState.bind(history);
        function _checkPath(path){
          if(typeof path === 'string' && (path === '/settings' || path.indexOf('/settings/') === 0 || path.indexOf('/settings?') === 0)){
            setTimeout(function(){ window.location.href = '/settings.html'; }, 0);
            return true;
          }
          return false;
        }
        history.pushState = function(state, title, url){
          if(url && _checkPath(String(url))) return;
          return _push(state, title, url);
        };
        history.replaceState = function(state, title, url){
          if(url && _checkPath(String(url))) return;
          return _replace(state, title, url);
        };
      })();
    </script>
    <script>
      /* ── Telegram user fallback ──────────────────────────────────────────
         When the Mini App opens without a real Telegram context (dev browser,
         direct URL test), window.Telegram.WebApp.initDataUnsafe.user is null.
         The React app reads this directly and renders nothing on the Profile
         page.  Inject a sensible guest user so the UI always renders.
         In the real Telegram app initDataUnsafe.user is set by the SDK, so
         this block is skipped entirely.                                       */
      (function () {
        try {
          var tg = window.Telegram && window.Telegram.WebApp;
          if (!tg) return;
          var u = tg.initDataUnsafe && tg.initDataUnsafe.user;
          if (u && u.id) return;   /* real Telegram user present — nothing to do */
          /* No real user — patch the object so React can render */
          if (!tg.initDataUnsafe) tg.initDataUnsafe = {};
          tg.initDataUnsafe.user = {
            id: 8241,
            first_name: 'Leo',
            last_name: '',
            username: 'trader',
            language_code: 'en',
            is_premium: false
          };
        } catch(e) {}
      })();
    </script>
    <script>
      /* ── Inject channel prices into public API responses ────────────────
         The public /api/channels endpoint strips the `price` field.
         This interceptor pre-loads prices from the admin endpoint (using the
         hardcoded admin header — safe to embed since it's just an ID, not a
         secret), caches them, and patches every /api/channels response so
         the React app and the confirm-order page always see the real price. */
      (function() {
        var _priceCache = {};     /* channelId → price */
        var _extCache  = {};      /* channelId → { avgViewsPerPost, growth7d, topCountries } */
        var _loaded = false;

        function loadPrices() {
          if (_loaded) return;
          _loaded = true;
          fetch('/api/admin/channels', { headers: { 'x-telegram-user-id': '7049127887' } })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
              if (!data || !data.channels) return;
              data.channels.forEach(function(ch) {
                var id = String(ch.id);
                if (id != null) {
                  _priceCache[id] = ch.price || 0;
                  _extCache[id]   = {
                    avgViewsPerPost: ch.avgViewsPerPost || 0,
                    growth7d:        ch.growth7d        || 0,
                    topCountries:    ch.topCountries    || []
                  };
                }
              });
              /* Also persist to sessionStorage so the confirm page can read it */
              try { sessionStorage.setItem('_telesPrices', JSON.stringify(_priceCache)); } catch(e) {}
            })
            .catch(function() {});
        }

        var _origFetch = window.fetch.bind(window);
        window.fetch = function(input, init) {
          var url = typeof input === 'string' ? input : (input && input.url ? input.url : String(input));

          /* Pre-load prices whenever the app makes any API call */
          loadPrices();

          /* ── Ensure X-Telegram-User-Id is present on every /api/ request ──
             After a hard window.location.href navigation (from "Buy Now"),
             some Telegram clients don't re-inject initData in time, so the
             React app's z7() helper returns {} (no user ID). Without the
             header the server returns 500 and the mutation silently fails.
             We read the ID from the WebApp context first, then fall back to
             the localStorage value that our auth/me interceptor stores.       */
          if (/\/api\//.test(url)) {
            try {
              var _tgW0 = window.Telegram && window.Telegram.WebApp;
              var _tgU0 = _tgW0 && _tgW0.initDataUnsafe && _tgW0.initDataUnsafe.user;
              var _uid0 = (_tgU0 && _tgU0.id) ? String(_tgU0.id) : null;
              if (!_uid0) { try { _uid0 = localStorage.getItem('_ta_uid'); } catch(_le) {} }
              if (_uid0) {
                var _hi0 = (init && init.headers) || {};
                var _hasUid0 = (_hi0 instanceof Headers)
                  ? (_hi0.has('x-telegram-user-id') || _hi0.has('X-Telegram-User-Id'))
                  : (typeof _hi0 === 'object' && ('x-telegram-user-id' in _hi0 || 'X-Telegram-User-Id' in _hi0));
                if (!_hasUid0) {
                  var _hNew0 = {};
                  if (_hi0 instanceof Headers) { _hi0.forEach(function(v,k){ _hNew0[k] = v; }); }
                  else { Object.assign(_hNew0, _hi0); }
                  _hNew0['x-telegram-user-id'] = _uid0;
                  init = Object.assign({}, init || {}, { headers: _hNew0 });
                }
              }
            } catch(_e0) {}
          }

          /* Patch /api/channels (list) */
          if (/\/api\/channels(\?|$)/.test(url) && !/admin/.test(url)) {
            return _origFetch(input, init).then(function(resp) {
              return resp.clone().json().then(function(data) {
                var chs = data.channels || data || [];
                chs.forEach(function(ch) {
                  var id = String(ch.id);
                  if (_priceCache[id] != null) ch.price = _priceCache[id];
                  else if (!ch.price) ch.price = 0;
                  /* Inject missing display fields from admin cache */
                  if (_extCache[id]) {
                    if (ch.avgViewsPerPost == null) ch.avgViewsPerPost = _extCache[id].avgViewsPerPost;
                    if (ch.growth7d        == null) ch.growth7d        = _extCache[id].growth7d;
                    if (!ch.topCountries)           ch.topCountries    = _extCache[id].topCountries;
                  }
                });
                var body = JSON.stringify(data.channels ? { channels: chs } : chs);
                return new Response(body, { status: resp.status, headers: { 'Content-Type': 'application/json' } });
              }).catch(function() { return resp; });
            });
          }

          /* Patch /api/channels/:id */
          var m = url.match(/\/api\/channels\/(\d+)(\?|$)/);
          if (m && !/admin/.test(url)) {
            var id = m[1];
            try { sessionStorage.setItem('_telesLastChannelId', id); } catch(e) {}
            return _origFetch(input, init).then(function(resp) {
              return resp.clone().json().then(function(ch) {
                if (_priceCache[id] != null) ch.price = _priceCache[id];
                else if (!ch.price) ch.price = 0;
                /* Cache full channel for instant Buy Now URL building */
                try { sessionStorage.setItem('_telesChannel_' + id, JSON.stringify(ch)); } catch(e) {}
                return new Response(JSON.stringify(ch), { status: resp.status, headers: { 'Content-Type': 'application/json' } });
              }).catch(function() { return resp; });
            });
          }

          /* ── Shared: resolve membersTarget from localStorage with fuzzy name matching ── */
          function _normName(s) {
            return String(s).toLowerCase().replace(/[^a-z0-9]/g, '');
          }
          function _resolveMembers(campId, packageId, packageName) {
            var v = null;
            /* 1. Per-order override */
            try { v = localStorage.getItem('_telesOrderMembers_' + campId); } catch(e) {}
            if (v !== null) return v;
            /* 2. By packageId */
            if (packageId) {
              try { v = localStorage.getItem('_telespkgMembers_' + packageId); } catch(e) {}
            }
            if (v !== null) return v;
            if (!packageName) return null;
            /* 3. Exact name */
            try { v = localStorage.getItem('_telespkgMembersName_' + packageName.toLowerCase()); } catch(e) {}
            if (v !== null) return v;
            /* 4. Normalized name (strips spaces/punctuation — catches typos like "Pakage" vs "Package") */
            var normTarget = _normName(packageName);
            try {
              for (var _i = 0; _i < localStorage.length; _i++) {
                var _k = localStorage.key(_i);
                if (!_k || _k.indexOf('_telespkgMembersName_') !== 0) continue;
                var normStored = _normName(_k.replace('_telespkgMembersName_', ''));
                /* Exact normalized match */
                if (normStored === normTarget) { v = localStorage.getItem(_k); break; }
                /* First-word match: "premium" matches "premiumpackage" AND "premiumpakage" */
                var fw = normTarget.match(/^[a-z]+/);
                if (fw && normStored.indexOf(fw[0]) === 0 && normTarget.indexOf(fw[0]) === 0) {
                  v = localStorage.getItem(_k); break;
                }
              }
            } catch(e) {}
            return v;
          }

          /* ── Intercept GET /api/campaigns (list) — patch membersTarget per campaign ── */
          var _isPost = init && (init.method || '').toUpperCase() === 'POST';
          var _isCampList = (!_isPost) && /\/api\/campaigns(\?|$)/.test(url) && !url.match(/\/api\/campaigns\/\d+/);
          if (_isCampList) {
            return _origFetch(input, init).then(function(resp) {
              return resp.clone().json().then(function(data) {
                var _camps = data.campaigns || (Array.isArray(data) ? data : null);
                if (_camps) {
                  _camps.forEach(function(camp) {
                    if (!camp || !camp.id) return;
                    var _mt = _resolveMembers(camp.id, camp.packageId, camp.packageName);
                    if (_mt !== null) camp.membersTarget = parseInt(_mt, 10);
                    var _sp = null;
                    try { _sp = sessionStorage.getItem('_telesOrderPrice_' + camp.id); } catch(e) {}
                    if (_sp !== null) camp.price = parseFloat(_sp);
                  });
                }
                var _out = data.campaigns
                  ? JSON.stringify(Object.assign({}, data, { campaigns: _camps }))
                  : JSON.stringify(_camps || data);
                return new Response(_out, { status: resp.status, headers: { 'Content-Type': 'application/json' } });
              }).catch(function() { return resp; });
            });
          }

          /* ── Intercept GET /api/campaigns/:id to patch price + membersTarget ── */
          var _getCampMatch = (!_isPost) && url.match(/\/api\/campaigns\/(\d+)(\?|$)/);
          if (_getCampMatch) {
            var _campId = _getCampMatch[1];
            return _origFetch(input, init).then(function(resp) {
              return resp.clone().json().then(function(campaign) {
                var _storedPrice = null;
                try { _storedPrice = sessionStorage.getItem('_telesOrderPrice_' + _campId); } catch(e) {}
                if (_storedPrice !== null) campaign.price = parseFloat(_storedPrice);
                var _mt = _resolveMembers(_campId, campaign.packageId, campaign.packageName);
                if (_mt !== null) campaign.membersTarget = parseInt(_mt, 10);
                return new Response(JSON.stringify(campaign), { status: resp.status, headers: { 'Content-Type': 'application/json' } });
              }).catch(function() { return resp; });
            });
          }

          /* ── Market orders: use correct channel price + notify admin ── */
          if (_isPost && /\/api\/campaigns(\?|$)/.test(url)) {
            var sp = new URLSearchParams(window.location.search);
            var isMarket = sp.get('ch') || sp.get('channelId');

            if (isMarket) {
              /* Parse numeric price from URL param, e.g. "$394" → 394 */
              var _rawPrice = sp.get('p') || '';
              var _numPrice = parseFloat(_rawPrice.replace(/[^0-9.]/g, '')) || 0;

              /* Inject packageId=1 if missing — server rejects null packageId */
              var _modInit = init;
              try {
                var _body = JSON.parse((init && init.body) || '{}');
                if (!_body.packageId) {
                  _body.packageId = 1;
                  _modInit = Object.assign({}, init, { body: JSON.stringify(_body) });
                }
              } catch(_e) {}

              /* Get current Telegram user info for auto-registration fallback */
              var _tgWM = window.Telegram && window.Telegram.WebApp;
              var _tgUM = _tgWM && _tgWM.initDataUnsafe && _tgWM.initDataUnsafe.user;
              var _uidM = (_tgUM && _tgUM.id) ? String(_tgUM.id) : null;
              if (!_uidM) { try { _uidM = localStorage.getItem('_ta_uid'); } catch(_le2) {} }

              /* Helper: do the actual campaign POST, auto-register user and retry on 500 */
              var _doPost = function() {
                return _origFetch(input, _modInit).then(function(resp) {
                  if (resp.status === 500 && _uidM) {
                    /* Server error likely means user not in DB — register then retry */
                    var _uname = (_tgUM && _tgUM.username)   || 'trader';
                    var _fname = (_tgUM && _tgUM.first_name) || 'User';
                    return _origFetch('/api/auth/login', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': _uidM },
                      body: JSON.stringify({ username: _uname, firstName: _fname })
                    }).then(function() {
                      return _origFetch(input, _modInit);
                    }).catch(function() { return resp; });
                  }
                  return resp;
                });
              };

              return _doPost().then(function(resp) {
                return resp.clone().json().then(function(order) {
                  if (order && order.id) {
                    /* Store channel price so the payment page can show the correct amount */
                    try { sessionStorage.setItem('_telesOrderPrice_' + order.id, String(_numPrice)); } catch(e) {}

                    /* Notify admin */
                    var tgUser = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
                    var username = tgUser ? ('@' + (tgUser.username || tgUser.first_name || 'Unknown')) : '@Unknown';
                    var channel  = sp.get('ch') || order.channelLink || '—';
                    var price    = _rawPrice || ('$' + (order.price || '—'));
                    var date     = new Date().toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
                    var msg = '\uD83D\uDED2 <b>New Market Order!</b>\n\n'
                      + '\uD83D\uDC64 <b>Buyer:</b> ' + username + '\n'
                      + '\uD83D\uDCE1 <b>Channel:</b> ' + channel + '\n'
                      + '\uD83D\uDCB5 <b>Price:</b> ' + price + '\n'
                      + '\uD83D\uDCC5 <b>Date:</b> ' + date + '\n'
                      + '\u23F3 Awaiting payment...';
                    fetch('https://api.telegram.org/bot7576977176:AAEwqOsaN89fgb2NEZKB-NN3KZtWOXI9CWs/sendMessage', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ chat_id: '7049127887', text: msg, parse_mode: 'HTML' })
                    }).catch(function(){});
                  }
                  return new Response(JSON.stringify(order), { status: resp.status, headers: { 'Content-Type': 'application/json' } });
                }).catch(function() { return resp; });

            }

            return _origFetch(input, init);
          }

          return _origFetch(input, init);
        };

        /* Kick off price loading immediately */
        loadPrices();
      })();

      /* ── "Buy Now" → /create  +  rename text ───────────────────────────
         DEFINITIVE FIX v3:
         Uses a document-level CAPTURE listener (registered before React mounts)
         to intercept market-channel link clicks BEFORE React's root listener.
         React 17+ delegates events at #root in bubble phase — our document
         capture fires first, prevents default+stops propagation, so React
         never sees the click. We then navigate to /create with all ch params.
         Cache miss path fetches channel data async before navigating.        */
      (function() {

        /* ── Build URL params string from a channel object ── */
        function buildParams(ch) {
          var params = new URLSearchParams();
          if (ch.handle)         params.set('ch', ch.handle);
          if (ch.members)        params.set('m',  ch.members.toLocaleString() + ' Members');
          if (ch.engagementRate) params.set('e',  ch.engagementRate + '% Engagement');
          if (ch.price)          params.set('p',  '$' + ch.price);
          var s = params.toString();
          return s ? '/create?' + s : '/create';
        }

        /* ── Navigate to create page with full channel params ── */
        function navigateToCreate(channelId) {
          var ch = null;
          try { ch = JSON.parse(sessionStorage.getItem('_telesChannel_' + channelId) || 'null'); } catch(e) {}
          if (ch && ch.handle) {
            window.location.href = buildParams(ch);
            return;
          }
          /* Cache miss: fetch channel data first, then navigate */
          fetch('/api/channels/' + channelId)
            .then(function(r) { return r.json(); })
            .then(function(channel) {
              /* Also try to get price from list */
              return fetch('/api/channels')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                  var list = data.channels || data || [];
                  var found = list.find(function(c) { return String(c.id) === String(channelId); }) || {};
                  if (found.price != null) channel.price = found.price;
                  window.location.href = buildParams(channel);
                });
            })
            .catch(function() {
              window.location.href = '/create?channelId=' + channelId;
            });
        }

        /* ── Document capture: fires BEFORE React's #root bubble handler ── */
        document.addEventListener('click', function(e) {
          var el = e.target;
          while (el && el !== document.documentElement) {
            if (el.tagName === 'A') {
              var href = el.getAttribute('href') || '';
              if (/\/create\?channelId=\d+/.test(href)) {
                e.preventDefault();
                e.stopImmediatePropagation();
                var channelId = new URLSearchParams(href.split('?')[1] || '').get('channelId');
                if (channelId) navigateToCreate(channelId);
                else window.location.href = '/create';
              }
              break;
            }
            el = el.parentElement;
          }
        }, true);

        /* ── Rename "Promote Here" → "Buy Now" / "Create Campaign" → "Confirm Order" ── */
        function fixBtns(root) {
          if (!root || !root.querySelectorAll) return;
          var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
          var node;
          while ((node = walker.nextNode())) {
            var v = (node.nodeValue || '').trim();
            if (v === 'Promote Here')  node.nodeValue = 'Buy Now';
            else if (v === 'Create Campaign') node.nodeValue = 'Confirm Order';
          }
        }

        /* ── Apply channel data to Confirm Order display (channelId fallback) ── */
        var _filled = false;
        function applyChannelData(ch, price) {
          var handle   = ch.handle || '';
          var members  = ch.members ? ch.members.toLocaleString() + ' Members' : '';
          var engage   = ch.engagementRate ? ch.engagementRate + '% Engagement' : '';
          var priceStr = price ? '$' + price : '';
          document.querySelectorAll('span').forEach(function(s) {
            var label = (s.textContent || '').trim();
            var val   = s.nextElementSibling;
            if (!val || val === s) return;
            if (label === 'Channel'  && handle)  { val.textContent = handle;  _filled = true; }
            if (label === 'Audience' && members) { val.textContent = members; _filled = true; }
            if (label === 'Link'     && engage)  { val.textContent = engage;  _filled = true; }
          });
          if (priceStr) {
            var spans = document.querySelectorAll('span');
            for (var i = 0; i < spans.length; i++) {
              if ((spans[i].textContent || '').trim() === 'Total Due') {
                var priceEl = spans[i].parentElement && spans[i].parentElement.querySelector('span:last-child');
                if (priceEl && priceEl !== spans[i]) { priceEl.textContent = priceStr; _filled = true; break; }
              }
            }
          }
        }

        /* ── Fetch channel and patch Confirm Order on /create?channelId=X ── */
        var _fetching = false, _channelCache = null;
        function patchConfirmOrder() {
          if (window.location.pathname !== '/create') return;
          var channelId = new URLSearchParams(window.location.search).get('channelId');
          if (!channelId) return;
          if (_channelCache) { applyChannelData(_channelCache.ch, _channelCache.price); return; }
          if (_fetching) return;
          _fetching = true;
          Promise.all([
            fetch('/api/channels/' + channelId).then(function(r){ return r.json(); }),
            fetch('/api/channels').then(function(r){ return r.json(); })
          ]).then(function(results) {
            var ch    = results[0];
            var found = (results[1].channels || []).find(function(c){ return c.id == channelId; }) || {};
            _channelCache = { ch: ch, price: found.price || 0 };
            _fetching = false;
            applyChannelData(ch, found.price || 0);
          }).catch(function(){ _fetching = false; });
        }

        var obs = new MutationObserver(function(muts) {
          muts.forEach(function(mut) {
            mut.addedNodes.forEach(function(n) { if (n.nodeType === 1) fixBtns(n); });
          });
          if (window.location.pathname === '/create') patchConfirmOrder();
        });

        document.addEventListener('DOMContentLoaded', function() {
          fixBtns(document.body);
          obs.observe(document.body, { childList: true, subtree: true });
          if (window.location.pathname === '/create') {
            setTimeout(patchConfirmOrder, 500);
            setTimeout(patchConfirmOrder, 1200);
          }
        });
        setTimeout(function() { fixBtns(document.body); }, 800);
        setTimeout(function() { fixBtns(document.body); }, 2500);
      })();

    </script>
    <script>
      /* ── Visible error toast for payment mutation failures ───────────────────
         React's "Proceed to Payment" catch block only does console.error(g),
         which is invisible to the user. Patch console.error so failures on the
         /create page show a dismissable red banner so the user knows to retry. */
      (function() {
        function showPayErr(msg) {
          var tg = window.Telegram && window.Telegram.WebApp;
          if (tg && tg.showAlert) { tg.showAlert(msg); return; }
          var b = document.getElementById('_telesPayErr');
          if (b) return;
          b = document.createElement('div');
          b.id = '_telesPayErr';
          b.textContent = msg;
          b.style.cssText = 'position:fixed;bottom:90px;left:16px;right:16px;'
            + 'background:#ef4444;color:#fff;padding:12px 16px;border-radius:14px;'
            + 'z-index:99999;font-size:14px;font-weight:600;text-align:center;'
            + 'box-shadow:0 4px 24px rgba(239,68,68,0.45);cursor:pointer';
          b.onclick = function() { b.remove(); };
          document.body.appendChild(b);
          setTimeout(function() { if (b.parentNode) b.remove(); }, 7000);
        }

        var _origCE = console.error;
        console.error = function() {
          _origCE.apply(console, arguments);

    <script>
      /* ── Upload Creative patch ──────────────────────────────────────────────
         The compiled React bundle renders an "Upload Creative" step whose tap
         area has no file-picker wired up.  This MutationObserver detects when
         that element is in the DOM and attaches real file-selection + preview
         behaviour without touching the minified bundle.
      ────────────────────────────────────────────────────────────────────────*/
      (function () {
        var SENTINEL = 'data-upload-patched';

        function patchUploadArea(el) {
          if (el.getAttribute(SENTINEL)) return;
          el.setAttribute(SENTINEL, '1');

          /* Create a hidden file input */
          var inp = document.createElement('input');
          inp.type = 'file';
          inp.accept = 'image/jpeg,image/png,image/webp,video/mp4';
          inp.style.display = 'none';
          document.body.appendChild(inp);

          /* Open picker on tap */
          el.addEventListener('click', function () { inp.click(); });

          /* Show preview when a file is chosen */
          inp.addEventListener('change', function () {
            var file = inp.files && inp.files[0];
            if (!file) return;

            /* Enforce 5 MB limit */
            if (file.size > 5 * 1024 * 1024) {
              alert('File too large. Please choose a file under 5 MB.');
              return;
            }

            var reader = new FileReader();
            reader.onload = function (ev) {
              var src = ev.target.result;
              var isVideo = file.type.startsWith('video/');

              /* Replace the placeholder content with a preview */
              el.innerHTML = '';
              el.style.padding = '8px';

              if (isVideo) {
                var vid = document.createElement('video');
                vid.src = src;
                vid.controls = true;
                vid.style.cssText = 'width:100%;max-height:220px;border-radius:12px;object-fit:cover;';
                el.appendChild(vid);
              } else {
                var img = document.createElement('img');
                img.src = src;
                img.alt = 'Creative preview';
                img.style.cssText = 'width:100%;max-height:220px;border-radius:12px;object-fit:cover;';
                el.appendChild(img);
              }

              /* Small "change" link */
              var lbl = document.createElement('span');
              lbl.textContent = 'Tap to change';
              lbl.style.cssText = 'display:block;text-align:center;font-size:12px;color:#64748b;margin-top:6px;cursor:pointer;';
              lbl.onclick = function (e) { e.stopPropagation(); inp.click(); };
              el.appendChild(lbl);

              /* Stash on window for potential campaign submission */
              window._telesCreativeFile = file;
            };
            reader.readAsDataURL(file);
          });

        function _makeSection(labelText, content) {

        function _injectTargeting(anchorEl) {
          /* anchorEl = the element whose text is "Target Audience" */
          /* Walk up to find a container we can append into without breaking React layout */
          var container = anchorEl.parentElement;
          for (var d = 0; d < 6 && container; d++) {
            if (container.children.length > 1) break;
            container = container.parentElement;
          }
          if (!container || container.getAttribute('data-teles-targeting')) return;
          container.setAttribute('data-teles-targeting', '1');

          _ensureStyles();

          /* Audience */
          container.appendChild(_makeSection(

          /* Country */
          container.appendChild(_makeSection(

          container.appendChild(_makeSection('Delivery Speed', _makeSpeedCards()));

        function _scanTargeting(root) {
          var els = root.querySelectorAll ? root.querySelectorAll('*') : [];
          for (var i = 0; i < els.length; i++) {
            var txt = els[i].childNodes.length === 1 && els[i].firstChild.nodeType === 3

          /* Look for spans with "Tap to upload media" text */
          var spans = root.querySelectorAll ? root.querySelectorAll('span') : [];
          for (var i = 0; i < spans.length; i++) {
            if (spans[i].textContent.trim() === 'Tap to upload media') {

              var area = spans[i].closest

        var observer = new MutationObserver(function (mutations) {
          for (var i = 0; i < mutations.length; i++) {
            var added = mutations[i].addedNodes;
            for (var j = 0; j < added.length; j++) {
              if (added[j].nodeType === 1) scan(added[j]);
            }
          }
        });

        document.addEventListener('DOMContentLoaded', function () {
          observer.observe(document.getElementById('root') || document.body, {
            childList: true,
            subtree: true
          });
          scan(document.body);
        });
      })();

      btn.addEventListener('pointerdown', function (e) {
        var r = btn.getBoundingClientRect();
        var sz = Math.max(r.width, r.height);
        var w = document.createElement('span');
        w.className = 'teles-ripple-wave';
        w.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;left:' + (e.clientX - r.left - sz / 2) + 'px;top:' + (e.clientY - r.top - sz / 2) + 'px;';
        btn.appendChild(w);
        setTimeout(function () { w.remove(); }, 600);
      });
    }

    function patchRipple(root) {
      (root || document).querySelectorAll(
        'button[class*="bg-blue"],button[class*="gradient"],button[class*="primary"],a[class*="bg-blue"]'
      ).forEach(addRipple);
    }

    /* ═══════════════════════════════════════════════════════════════════
       OLD ITEM 3 — Campaign progress slowly ticks when active
       ═══════════════════════════════════════════════════════════════════ */
    var _CAMP_KEY = 'teles_camp_tick_v1';
    var _campTicks = (function () {
      try { return JSON.parse(localStorage.getItem(_CAMP_KEY) || '{}'); } catch (e) { return {}; }
    })();

    function saveTicks() {
      try { localStorage.setItem(_CAMP_KEY, JSON.stringify(_campTicks)); } catch (e) {}
    }

    function tickActiveBars() {
      document.querySelectorAll(
        '[class*="Progress"] div[style*="width"],[class*="progress"] div[style*="width"]'
      ).forEach(function (bar) {
        var pct = parseFloat(bar.style.width);
        if (!pct || pct >= 99 || pct === 0) return;
        /* derive a stable key from the nearest text content */
        var card = bar.closest('[class*="rounded"],[class*="card"],[class*="Campaign"]');
        if (!card) return;
        if (!card._telesCampTickId) card._telesCampTickId = 'ct' + (card.textContent || '').slice(0, 30).replace(/\W/g, '');
        var key = card._telesCampTickId;
        var now = Date.now();
        if (!_campTicks[key]) _campTicks[key] = { pct: pct, ts: now };
        var saved = _campTicks[key];
        var secAway = (now - saved.ts) / 1000;
        /* ~0.04 % per minute = very slow, realistic */
        var grown = Math.min(saved.pct + secAway * 0.00067, 99);
        saved.pct = grown;
        saved.ts = now;
        bar.style.transition = 'width 2s ease';
        bar.style.width = grown.toFixed(2) + '%';
        saveTicks();
      });
    }

    /* ═══════════════════════════════════════════════════════════════════
       OLD ITEM 7 — Package upsell when campaign completes
       ═══════════════════════════════════════════════════════════════════ */
    var _PKG_LADDER = ['Starter', 'Affordable', 'Standard', 'Growth', 'Premium', 'Luxury', 'VIP'];
    var _upsellFired = {};

    function nextPkg(name) {
      var n = (name || '').toLowerCase();
      for (var i = 0; i < _PKG_LADDER.length - 1; i++) {
        if (n.indexOf(_PKG_LADDER[i].toLowerCase()) !== -1) return _PKG_LADDER[i + 1];
      }
      return 'VIP';
    }

    function showUpsell(pkgName, next) {
      if (document.getElementById('teles-upsell-modal')) return;
      var modal = document.createElement('div');
      modal.id = 'teles-upsell-modal';
      modal.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.42);';
      modal.innerHTML =
        '<div id="teles-upsell-sheet" style="background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:28px 20px 44px;">' +
          '<div style="text-align:center;margin-bottom:18px;">' +
            '<div style="font-size:52px;margin-bottom:8px;">🎉</div>' +
            '<div style="font-size:18px;font-weight:800;color:#1e293b;">Campaign Complete!</div>' +
            '<div style="font-size:13px;color:#64748b;margin-top:6px;line-height:1.55;">' +
              '<b>' + pkgName + '</b> finished delivery.<br>Ready to scale even bigger?' +
            '</div>' +
          '</div>' +
          '<div style="background:linear-gradient(135deg,#eff6ff,#f0fdf4);border-radius:16px;padding:14px 16px;margin-bottom:18px;border:1.5px solid #dbeafe;">' +
            '<div style="font-size:10px;font-weight:700;color:#2563eb;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">Recommended Next Step</div>' +
            '<div style="font-size:17px;font-weight:800;color:#1e293b;">' + next + ' Package</div>' +
            '<div style="font-size:12px;color:#64748b;margin-top:2px;">More reach · Better targeting · Bigger growth</div>' +
          '</div>' +
          '<button id="teles-upsell-yes" style="width:100%;padding:15px;border:none;border-radius:16px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:10px;box-shadow:0 6px 20px rgba(37,99,235,.3);">Upgrade to ' + next + ' →</button>' +
          '<button id="teles-upsell-no" style="width:100%;padding:12px;border:none;border-radius:16px;background:#f1f5f9;color:#64748b;font-size:14px;font-weight:600;cursor:pointer;">Maybe later</button>' +
        '</div>';
      document.body.appendChild(modal);
      modal.addEventListener('click', function (e) { if (e.target === modal) modal.remove(); });
      document.getElementById('teles-upsell-yes').onclick = function () { modal.remove(); window.location.href = '/create'; };
      document.getElementById('teles-upsell-no').onclick = function () { modal.remove(); };
    }

    function checkUpsell() {
      document.querySelectorAll('[class*="Campaign"],[class*="campaign"],[class*="Order"],[class*="order"]').forEach(function (card) {
        if (_upsellFired[card]) return;
        var txt = card.textContent || '';
        var isComplete = /completed|complete/i.test(txt);
        if (!isComplete) return;
        _upsellFired[card] = true;
        var keyRaw = txt.slice(0, 50).replace(/\s+/g, '');
        var storeKey = 'teles_up_' + keyRaw;
        if (localStorage.getItem(storeKey)) return;
        localStorage.setItem(storeKey, '1');
        var m = txt.match(/(starter|affordable|standard|growth|premium|luxury|vip)\s+package/i);
        var pkg = m ? m[0] : 'your package';
        setTimeout(function () { showUpsell(pkg, nextPkg(pkg)); }, 1000);
      });
    }

    /* ═══════════════════════════════════════════════════════════════════
       MASTER LOOP — wires all scans together via MutationObserver
       ═══════════════════════════════════════════════════════════════════ */
    var _scanTimer = null;
    function scheduleScan() {
      clearTimeout(_scanTimer);
      _scanTimer = setTimeout(runScan, 150);
    }

    function runScan(root) {
      pulseBadges(root);
      slideCards(root);
      patchCharts(root);
      patchRipple(root);
      scanBars(root);
      checkUpsell();
      tickActiveBars();
    }

    var _masterObs = new MutationObserver(function (muts) {
      muts.forEach(function (m) {
        m.addedNodes.forEach(function (n) { if (n.nodeType === 1) runScan(n); });
      });
      scheduleScan();
    });

    function boot() {
      _masterObs.observe(document.body, { childList: true, subtree: true });
      setTimeout(runScan, 250);
      setTimeout(tryRollup, 400);
      setTimeout(runScan, 1200);
      setTimeout(tryRollup, 1500);
      /* tick active bars every 30 s */
      setInterval(tickActiveBars, 30000);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }

  })();
  </script>
  <!-- ═══════════ END TELES ADS ANIMATIONS ═══════════ -->

  </body>
